<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design note — In Bloom</title>
  <meta name="description" content="Design note for the automated storefront capture & visualisation pipeline." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html"><span class="leaf">&#10047;</span> In&nbsp;Bloom</a>
      <div class="nav-links">
        <a href="index.html#how">How it works</a>
        <a href="index.html#gallery">Gallery</a>
        <a href="editor.html">Editor</a>
        <a href="design.html">Design note</a>
      </div>
    </div>
  </nav>

  <main class="doc">
    <article id="doc" class="prose">Loading design note…</article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: false, theme: "base", themeVariables: {
      primaryColor: "#eef3ee", primaryBorderColor: "#3f7d54", primaryTextColor: "#14231a",
      lineColor: "#5d6b61", fontFamily: "inherit"
    }});

    const el = document.getElementById("doc");
    try {
      const md = await (await fetch("design.md", { cache: "no-store" })).text();
      el.innerHTML = marked.parse(md);
      // Convert ```mermaid code fences into mermaid diagrams (version-independent).
      el.querySelectorAll("pre > code.language-mermaid").forEach((code) => {
        const div = document.createElement("div");
        div.className = "mermaid";
        div.textContent = code.textContent;
        code.parentElement.replaceWith(div);
      });
      await mermaid.run({ querySelector: ".mermaid" });
    } catch (e) {
      el.innerHTML = `<p>Couldn't load the design note. Read it in the repo:
        <a href="https://github.com/Harsh-Pratap-Singh/innate/blob/main/design.md">design.md</a>.</p>`;
    }
  </script>
</body>
</html>
